---

- name: get latest release
  when:
    - not running_in_check_mode
    - compose_version == "latest"
  delegate_to: localhost
  become: false
  run_once: true
  block:
    - name: get latest release
      delegate_to: localhost
      become: false
      run_once: true
      bodsch.scm.github_latest:
        project: docker
        repository: compose
        user: "{{ lookup('env', 'GH_USER') | default(omit) }}"
        password: "{{ lookup('env', 'GH_TOKEN') | default(omit) }}"
        github_tags: "{{ compose_scm.use_tags | default('false') }}"
        without_beta: "{{ compose_scm.without_beta | default('false') }}"
        filter_elements: "{{ compose_scm.version_filter | default([]) }}"
      register: _latest_release

    - name: re-define compose_version
      ansible.builtin.set_fact:
        compose_version: "{{ _latest_release.latest_release }}"

- name: define download information
  when:
    - not running_in_check_mode
  ansible.builtin.set_fact:
    compose_release: "{{ compose_defaults_release | combine(compose_release, recursive=True) }}"

- name: create download directory
  when:
    - not running_in_check_mode
  become: false
  delegate_to: "{{ compose_delegate_to }}"
  run_once: "{{ 'false' if compose_direct_download else 'true' }}"
  ansible.builtin.file:
    path: "{{ compose_local_tmp_directory }}"
    state: directory
    mode: "0750"

- name: detect the downloaded docker-compose file
  when:
    - not running_in_check_mode
  become: false
  delegate_to: "{{ compose_delegate_to }}"
  run_once: "{{ 'false' if compose_direct_download else 'true' }}"
  ansible.builtin.stat:
    path: "{{ compose_local_tmp_directory }}/docker-compose"
  register: stat_compose_archive

- name: download
  when:
    - not running_in_check_mode
    - stat_compose_archive.stat is defined
    - not stat_compose_archive.stat.exists | default('false') | bool
  block:
    - name: download docker-compose file
      become: false
      delegate_to: "{{ compose_delegate_to }}"
      run_once: "{{ 'false' if compose_direct_download else 'true' }}"
      ansible.builtin.get_url:
        url: "{{ compose_release.github_url }}/download/v{{ compose_version }}/{{ compose_release.file }}"
        dest: "{{ compose_local_tmp_directory }}/docker-compose"
        mode: "0644"
      register: _download_archive
      until: _download_archive is succeeded
      retries: 5
      delay: 2
      check_mode: false

  rescue:
    - name: delete download directory
      become: false
      delegate_to: "{{ compose_delegate_to }}"
      run_once: "{{ 'false' if compose_direct_download else 'true' }}"
      ansible.builtin.file:
        path: "{{ compose_local_tmp_directory }}"
        state: absent

    - name: exit with fail
      ansible.builtin.fail:
        msg: A serious error occurred when downloading the archive.
...
