---

- name: information
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: arch- / artixlinux
      when:
        - ansible_facts.distribution | lower == 'archlinux' or
          ansible_facts.os_family | lower == 'artix linux'
      block:
        - name: update pacman system
          ansible.builtin.command: |
            pacman --refresh --sync --sysupgrade --noconfirm

        - name: create depends service
          ansible.builtin.copy:
            mode: "0755"
            dest: /etc/init.d/net
            content: |
              #!/usr/bin/openrc-run
              true
          when:
            - ansible_facts.os_family | lower == 'artix linux'

    - name: make sure python3-apt is installed (only debian based)
      ansible.builtin.package:
        name:
          - python3-apt
        state: present
      when:
        - ansible_facts.os_family | lower == 'debian'

    - name: update package cache
      become: true
      ansible.builtin.package:
        update_cache: true

    - name: environment
      ansible.builtin.debug:
        msg:
          - "os family            : {{ ansible_facts.distribution }} ({{ ansible_facts.os_family }})"
          - "distribution version : {{ ansible_facts.distribution_major_version }}"
          - "ansible version      : {{ ansible_version.full }}"
          - "python version       : {{ ansible_facts.python.version.major }}.{{ ansible_facts.python.version.minor }}"

- name: prepare
  hosts: instance
  any_errors_fatal: false
  become: false

  vars:
    users:
      - username: molecule
        uid: 2000
        update_password: on_create
        password_lock: false
        comment: Molecule Test
        password: "$5$5RPVAd$lnF2GPGVIju8XyratWgEusY19WTBLrGmesj93kzugi3"
        shell: /bin/bash
        groups:
          - sudo
        sudo:
          nopassword: false
          runas: "ALL"
          commands:
            - ALL
          # group: sudo
        state: present

  pre_tasks:
    # in a container the early-boot /run/nologin is not always removed, which
    # makes pam_nologin block the per-user 'systemd --user' manager. starting
    # systemd-user-sessions clears it, mimicking a fully booted system.
    - name: clear the login barrier (systemd-user-sessions)
      ansible.builtin.systemd_service:
        name: systemd-user-sessions.service
        state: started
      when:
        - ansible_facts.service_mgr | lower == "systemd"

    # - name: "create test user: molecule"
    #   bodsch.user:
    #     name: molecule
    #     shell: /bin/bash
    #     create_home: true

  roles:
    - role: bodsch.users

...
