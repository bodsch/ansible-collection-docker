---

namespace: bodsch
name: docker

version: 1.7.0

readme: README.md

authors:
  - Bodo Schulz (@bodsch)

description: A collection of Ansible roles for the Docker universe.

license:
  - Apache-2.0

license_file: ''

tags:
  - system
  - docker
  - container

dependencies:
  bodsch.core: ">=2.14.0"
  bodsch.scm: ">=1.12.0"
  community.docker: "*"
  community.general: ">=11.0.0"

repository: https://github.com/bodsch/ansible-collection-docker
documentation: https://github.com/bodsch/ansible-collection-docker/README.md
homepage: https://github.com/bodsch/ansible-collection-docker
issues: https://github.com/bodsch/ansible-collection-docker/issues

build_ignore:
  - "*.pyc"
  - "*.retry"
  - "*/molecule"
  - ".ansible-lint"
  - ".config"
  - ".editorconfig"
  - ".flake8"
  - ".git"
  - ".github"
  - ".gitignore"
  - ".yamllint"
  - "Makefile"
  - "galaxy.yml"
  - "hooks"
  - "test-requirements.txt"
  - "tox.ini"
